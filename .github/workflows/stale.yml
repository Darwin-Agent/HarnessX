name: Stale

on:
  schedule:
    - cron: "0 1 * * *"  # daily at 01:00 UTC

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been inactive for 60 days and will be closed in 7 days.
            If still relevant, please comment or remove the stale label.
          stale-pr-message: >
            This PR has been inactive for 30 days and will be closed in 7 days.
            If you still want it merged, please comment or remove the stale label.
          close-issue-message: "Closed automatically due to prolonged inactivity. Reopen if you'd like to continue."
          close-pr-message: "Closed automatically due to prolonged inactivity. Reopen if you'd like to merge."
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "pinned,security,bug"
          exempt-pr-labels: "pinned,security"
